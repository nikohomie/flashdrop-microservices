spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/flashdrop_auth}
    username: ${DB_USER:auth_service}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate      # Flyway crea el esquema; JPA solo valida
    open-in-view: false
    properties:
      hibernate.format_sql: false
  flyway:
    enabled: true

# Firma asimétrica RS256. En producción se proveen las claves RSA por entorno
# (JWT_PRIVATE_KEY / JWT_PUBLIC_KEY en PEM). Si faltan y allow-ephemeral es false,
# el arranque FALLA (S-02). El gateway valida con la clave pública del JWKS.
jwt:
  issuer: flashdrop-auth
  access-expiration-minutes: ${JWT_ACCESS_MIN:15}
  refresh-expiration-days: ${JWT_REFRESH_DAYS:30}
  private-key: ${JWT_PRIVATE_KEY:}
  public-key: ${JWT_PUBLIC_KEY:}
  allow-ephemeral-key: ${JWT_ALLOW_EPHEMERAL:false}

# S-08: límite de intentos de login por IP y por cuenta.
auth:
  ratelimit:
    max-attempts: ${AUTH_RL_MAX:5}
    window-seconds: ${AUTH_RL_WINDOW:300}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

server:
  port: ${PORT:8081}
  error:
    include-message: never       # S-11: no filtrar detalles internos
    include-stacktrace: never
    include-binding-errors: never
