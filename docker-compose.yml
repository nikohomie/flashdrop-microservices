version: '3.8'

services:
  # Base de datos centralizada
  postgres:
    image: postgres:15-alpine
    container_name: flashdrop-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-auth_service}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-flashdrop_auth}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auth_service}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
