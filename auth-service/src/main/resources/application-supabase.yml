# Perfil para conectar auth-service a su proyecto Supabase dedicado.
# Activar con: SPRING_PROFILES_ACTIVE=supabase (o --spring.profiles.active=supabase)
#
# Requiere en el entorno: DB_PASSWORD y las claves JWT (o JWT_ALLOW_EPHEMERAL=true).
# Si tu red no tiene IPv6, define DB_URL con el Session pooler (ver .env.example).
spring:
  config:
    activate:
      on-profile: supabase
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

supabase:
  url: ${SUPABASE_URL}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
