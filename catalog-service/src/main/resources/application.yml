spring:
  application:
    name: catalog-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/flashdrop_auth}
    username: ${DB_USER:auth_service}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate      # Flyway corre en auth-service; aquí solo validamos
    open-in-view: false
    properties:
      hibernate.format_sql: false
  flyway:
    enabled: false             # Las migraciones las gestiona auth-service

  # Perfil por defecto: local (usa InMemory, sin BD)
  profiles:
    default: local

# JWT: clave pública RSA para verificar tokens emitidos por auth-service
jwt:
  issuer: flashdrop-auth
  public-key: ${JWT_PUBLIC_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

server:
  port: ${PORT:8082}
  error:
    include-message: never       # No filtrar detalles internos
    include-stacktrace: never
    include-binding-errors: never
